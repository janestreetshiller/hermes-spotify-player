name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
      - name: Install Hermes Agent
        run: python -m pip install 'hermes-agent>=0.19,<0.20'
      - name: Run tests
        run: ./scripts/test.sh
